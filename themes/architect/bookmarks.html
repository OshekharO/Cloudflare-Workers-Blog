<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks — {{siteName}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@primer/css@21.8.5/dist/primer.min.css">
</head>
<body class="color-bg-default color-fg-default">
  <header class="border-bottom color-border-muted">
    <div class="container-lg p-3 d-flex flex-items-center flex-justify-between flex-wrap gap-2">
      <h1 class="h3 m-0">Bookmarks</h1>
      <div class="d-flex gap-2">
        <a href="/" class="btn">Home</a>
        <button id="clearAllBtn" class="btn">Clear all</button>
      </div>
    </div>
  </header>

  <main class="container-lg p-3">
    <p id="bookmarkCount" class="color-fg-muted mb-3">0 bookmarks</p>

    <div id="emptyState" class="Box" hidden>
      <div class="Box-body">No bookmarks saved yet.</div>
    </div>

    <div id="bookmarksGrid" class="d-grid gap-3"></div>
  </main>

  <footer class="border-top color-border-muted mt-4">
    <div class="container-lg p-3 color-fg-muted">{{copyRight}}</div>
  </footer>

  <script>
    function esc(v) {
      return String(v || '').replace(/[&<>'\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
    }

    function getBookmarks() {
      const raw = localStorage.getItem('blog_bookmarks');
      return raw ? JSON.parse(raw) : [];
    }

    function setBookmarks(items) {
      localStorage.setItem('blog_bookmarks', JSON.stringify(items));
    }

    function render() {
      const items = getBookmarks();
      const grid = document.getElementById('bookmarksGrid');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('bookmarkCount');
      count.textContent = `${items.length} bookmark${items.length === 1 ? '' : 's'}`;

      if (!items.length) {
        empty.hidden = false;
        grid.innerHTML = '';
        return;
      }

      empty.hidden = true;
      grid.innerHTML = items.map(item => `
        <article class="Box">
          <div class="Box-body d-flex flex-items-center flex-justify-between flex-wrap gap-2">
            <a class="h4 no-underline" href="/article/${encodeURIComponent(item.permalink)}">${esc(item.title || item.permalink)}</a>
            <div class="d-flex gap-2">
              <a class="btn" href="/article/${encodeURIComponent(item.permalink)}">Read</a>
              <button class="btn" data-remove="${esc(item.permalink)}">Remove</button>
            </div>
          </div>
        </article>
      `).join('');
    }

    document.getElementById('bookmarksGrid').addEventListener('click', e => {
      const btn = e.target.closest('[data-remove]');
      if (!btn) return;
      const keep = getBookmarks().filter(i => i.permalink !== btn.dataset.remove);
      setBookmarks(keep);
      render();
    });

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (!confirm('Clear all bookmarks?')) return;
      setBookmarks([]);
      render();
    });

    render();
  </script>
</body>
</html>
