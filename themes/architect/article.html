<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}} — {{siteName}}</title>
  <meta name="description" content="{{excerpt}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{excerpt}}">
  <meta property="og:type" content="article">
  {{#img}}<meta property="og:image" content="{{img}}">{{/img}}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@primer/css@21.8.5/dist/primer.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  {{codeBeforHead}}
</head>
<body class="color-bg-default color-fg-default">
  <header class="border-bottom color-border-muted">
    <div class="container-lg p-3 d-flex flex-items-center flex-justify-between flex-wrap gap-2">
      <a href="/" class="h3 m-0 no-underline color-fg-default">{{siteName}}</a>
      <div class="d-flex gap-2">
        <a href="/" class="btn">Home</a>
        <a href="/bookmarks" class="btn">Bookmarks</a>
      </div>
    </div>
  </header>

  <main class="container-lg p-3">
    <article class="Box mb-3">
      <div class="Box-body">
        <a href="/?category={{label}}" class="Label">{{label}}</a>
        <h1 class="h1 mt-2 mb-2">{{title}}</h1>
        <p class="color-fg-muted mb-0">Published {{createDate}} • <span id="readTimeVal">1</span> min read</p>
      </div>
      {{#img}}
      <img src="{{img}}" alt="{{title}}">
      {{/img}}
      <div class="Box-body markdown-body" id="articleBody">{{content}}</div>
    </article>

    <section class="Box mb-3" id="commentsSection" {{^commentCode}}hidden{{/commentCode}}>
      <div class="Box-header">
        <h2 class="Box-title">Comments (<span id="commentsCount">0</span>)</h2>
      </div>
      <div class="Box-body">
        <p id="commentsStatus" class="color-fg-muted">Loading comments...</p>
        <div id="commentsList" class="d-grid gap-2"></div>
      </div>
      <div class="Box-body border-top color-border-muted">
        <form id="commentForm" class="d-grid gap-2">
          <input id="commentAuthor" class="form-control" placeholder="Your name" maxlength="80" required>
          <textarea id="commentContent" class="form-control" rows="4" maxlength="2000" placeholder="Write a comment" required></textarea>
          <button id="commentSubmit" class="btn btn-primary" type="submit">Post comment</button>
        </form>
      </div>
    </section>

    <section>
      {{commentCode}}
    </section>
  </main>

  <footer class="border-top color-border-muted mt-4">
    <div class="container-lg p-3 color-fg-muted">{{copyRight}}</div>
  </footer>

  {{codeBeforBody}}

  <script>
    function esc(v) {
      return String(v || '').replace(/[&<>'\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
    }

    function formatDate(v) {
      const d = new Date(v || Date.now());
      return Number.isNaN(d.getTime()) ? '' : d.toLocaleString();
    }

    function estimateReadTime(text) {
      const words = String(text || '').trim().split(/\s+/).filter(Boolean).length;
      return Math.max(1, Math.ceil(words / 220));
    }

    async function loadComments() {
      const permalink = location.pathname.split('/').pop();
      const status = document.getElementById('commentsStatus');
      const list = document.getElementById('commentsList');
      const count = document.getElementById('commentsCount');
      try {
        const res = await fetch(`/api/comments/${encodeURIComponent(permalink)}?limit=100`);
        const data = await res.json();
        const comments = Array.isArray(data?.comments) ? data.comments : [];
        count.textContent = String(comments.length);
        if (!comments.length) {
          status.textContent = 'No comments yet.';
          list.innerHTML = '';
          return;
        }
        status.hidden = true;
        list.innerHTML = comments.map(c => `
          <div class="Box">
            <div class="Box-body">
              <p class="mb-1"><strong>${esc(c.author || 'Anonymous')}</strong></p>
              <p class="mb-1">${esc(c.content || '')}</p>
              <p class="f6 color-fg-muted mb-0">${esc(formatDate(c.createdAt))}</p>
            </div>
          </div>
        `).join('');
      } catch {
        status.textContent = 'Unable to load comments.';
      }
    }

    async function submitComment(event) {
      event.preventDefault();
      const permalink = location.pathname.split('/').pop();
      const authorEl = document.getElementById('commentAuthor');
      const contentEl = document.getElementById('commentContent');
      const btn = document.getElementById('commentSubmit');
      const payload = { author: authorEl.value.trim(), content: contentEl.value.trim() };
      if (!payload.author || !payload.content) return;
      btn.disabled = true;
      try {
        const res = await fetch(`/api/comments/${encodeURIComponent(permalink)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('failed');
        document.getElementById('commentForm').reset();
        await loadComments();
      } catch {
        alert('Failed to post comment.');
      } finally {
        btn.disabled = false;
      }
    }

    const body = document.getElementById('articleBody');
    if (body && window.marked) {
      const raw = body.textContent || '';
      body.innerHTML = marked.parse(raw);
      document.getElementById('readTimeVal').textContent = String(estimateReadTime(raw));
    }

    const commentForm = document.getElementById('commentForm');
    if (commentForm) {
      commentForm.addEventListener('submit', submitComment);
      loadComments();
    }
  </script>
</body>
</html>
