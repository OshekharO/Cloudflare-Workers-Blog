<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{action}} Article — {{siteName}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@primer/css@21.8.5/dist/primer.min.css">
</head>
<body class="color-bg-default color-fg-default">
  <header class="border-bottom color-border-muted">
    <div class="container-lg p-3 d-flex flex-items-center flex-justify-between">
      <h1 class="h3 m-0">{{action}} Article</h1>
      <div class="d-flex gap-2">
        <a href="/admin" class="btn">Back to Admin</a>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
    </div>
  </header>

  <main class="container-lg p-3">
    <form id="articleForm" class="Box">
      <div class="Box-body d-grid gap-3">
        <div>
          <label class="form-label" for="title">Title</label>
          <input id="title" class="form-control" required>
        </div>

        <div>
          <label class="form-label" for="permalink">Permalink</label>
          <div class="d-flex gap-2">
            <input id="permalink" class="form-control" required>
            <button id="genSlugBtn" class="btn" type="button">Generate</button>
          </div>
        </div>

        <div>
          <label class="form-label" for="label">Category</label>
          <input id="label" class="form-control" list="categorySuggestions">
          <datalist id="categorySuggestions"></datalist>
        </div>

        <div>
          <label class="form-label" for="img">Featured image URL</label>
          <input id="img" class="form-control" type="url" placeholder="https://...">
        </div>

        <div>
          <label class="form-label" for="createDate">Create date</label>
          <input id="createDate" class="form-control" type="datetime-local" required>
        </div>

        <div>
          <label class="form-label" for="status">Status</label>
          <select id="status" class="form-select">
            <option value="published">Published</option>
            <option value="draft">Draft</option>
          </select>
        </div>

        <div>
          <label class="form-label" for="content">Content (Markdown)</label>
          <textarea id="content" class="form-control" rows="18" required></textarea>
        </div>

        <p id="formAlert" class="color-fg-danger" hidden></p>
      </div>

      <div class="Box-footer">
        <button id="submitBtn" class="btn btn-primary" type="submit">Save Article</button>
      </div>
    </form>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/';

    function setError(msg) {
      const el = document.getElementById('formAlert');
      if (!msg) {
        el.hidden = true;
        el.textContent = '';
      } else {
        el.hidden = false;
        el.textContent = msg;
      }
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      });
      if (res.status === 401) {
        localStorage.removeItem('token');
        location.href = '/';
        throw new Error('unauthorized');
      }
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data?.error || 'Request failed');
      }
      return res.json();
    }

    function initDate() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('createDate').value = now.toISOString().slice(0, 16);
    }

    async function loadCategories() {
      try {
        const data = await api('/api/categories');
        const list = Array.isArray(data?.categories) ? data.categories : (Array.isArray(data) ? data : []);
        document.getElementById('categorySuggestions').innerHTML = list
          .map(c => `<option value="${String(c.label || c).replace(/"/g, '&quot;')}"></option>`)
          .join('');
      } catch {}
    }

    async function loadForEdit() {
      const permalink = new URLSearchParams(location.search).get('permalink');
      if (!permalink) {
        initDate();
        return;
      }
      const data = await api(`/api/articles/${encodeURIComponent(permalink)}`);
      const a = data?.article || data;
      document.getElementById('permalink').value = a.permalink || permalink;
      document.getElementById('permalink').readOnly = true;
      document.getElementById('title').value = a.title || '';
      document.getElementById('img').value = a.img || '';
      document.getElementById('label').value = a.label || '';
      document.getElementById('content').value = a.content || '';
      document.getElementById('status').value = a.status || 'published';
      if (a.createDate) {
        const d = new Date(a.createDate);
        if (!Number.isNaN(d.getTime())) {
          d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
          document.getElementById('createDate').value = d.toISOString().slice(0, 16);
        }
      } else {
        initDate();
      }
    }

    document.getElementById('genSlugBtn').addEventListener('click', async () => {
      const title = document.getElementById('title').value.trim();
      if (!title) return;
      try {
        const data = await api('/api/generate-slug', { method: 'POST', body: JSON.stringify({ title }) });
        document.getElementById('permalink').value = data.slug || '';
      } catch {
        document.getElementById('permalink').value = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      }
    });

    document.getElementById('articleForm').addEventListener('submit', async e => {
      e.preventDefault();
      setError('');
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      try {
        const payload = {
          permalink: document.getElementById('permalink').value.trim(),
          title: document.getElementById('title').value.trim(),
          img: document.getElementById('img').value.trim(),
          label: document.getElementById('label').value.trim(),
          createDate: document.getElementById('createDate').value,
          content: document.getElementById('content').value,
          status: document.getElementById('status').value
        };

        const editing = new URLSearchParams(location.search).has('permalink');
        const path = `/api/articles/${encodeURIComponent(payload.permalink)}`;

        if (editing) {
          await api(path, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          await api('/api/articles', { method: 'POST', body: JSON.stringify(payload) });
        }
        location.href = '/admin';
      } catch (err) {
        setError(err.message || 'Save failed');
      } finally {
        btn.disabled = false;
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      location.href = '/';
    });

    Promise.all([loadCategories(), loadForEdit()]).catch(err => setError(err.message || 'Failed to initialize editor'));
  </script>
</body>
</html>
