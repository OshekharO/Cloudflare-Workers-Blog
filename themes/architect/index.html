<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{siteName}}</title>
  <meta name="description" content="{{siteDescription}}">
  <meta property="og:title" content="{{siteName}}">
  <meta property="og:description" content="{{siteDescription}}">
  <meta property="og:type" content="website">
  <link rel="canonical" href="/">
  <link rel="alternate" type="application/rss+xml" title="{{siteName}} RSS Feed" href="/rss.xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@primer/css@21.8.5/dist/primer.min.css">
  {{codeBeforHead}}
</head>
<body class="color-bg-default color-fg-default">
  <header class="border-bottom color-border-muted">
    <div class="container-lg p-3 d-flex flex-items-center flex-justify-between flex-wrap gap-2">
      <a href="/" class="h3 m-0 color-fg-default no-underline">{{siteName}}</a>
      <div class="d-flex gap-2">
        <a href="/rss.xml" class="btn">RSS</a>
        <a href="/bookmarks" class="btn">Bookmarks</a>
        <a href="/admin" class="btn btn-primary">Admin</a>
      </div>
    </div>
  </header>

  <main class="container-lg p-3">
    <section class="Box mb-3">
      <div class="Box-body">
        <h1 class="h2 mb-2">Architect Theme</h1>
        <p class="color-fg-muted mb-0">{{siteDescription}}</p>
      </div>
    </section>

    <section class="Box mb-3">
      <div class="Box-body d-flex flex-wrap gap-2 flex-items-center">
        <input id="searchInput" class="form-control flex-1" type="search" placeholder="Search by title or excerpt">
        <select id="categoryFilter" class="form-select">
          <option value="">All categories</option>
        </select>
      </div>
    </section>

    <p id="articleCount" class="color-fg-muted mb-3"></p>

    <div id="loadingState" class="Box mb-3">
      <div class="Box-body">Loading articles...</div>
    </div>

    <div id="emptyState" class="Box mb-3" hidden>
      <div class="Box-body">No articles found.</div>
    </div>

    <div id="articlesGrid" class="d-grid gap-3"></div>

    <div id="paginationWrap" class="d-flex flex-items-center flex-justify-between mt-3" hidden>
      <button id="prevBtn" class="btn">Previous</button>
      <span id="pageLabel" class="color-fg-muted">Page 1</span>
      <button id="nextBtn" class="btn">Next</button>
    </div>
  </main>

  <footer class="border-top color-border-muted mt-4">
    <div class="container-lg p-3 color-fg-muted">{{copyRight}}</div>
  </footer>

  {{codeBeforBody}}

  <script>
    const state = {
      page: Number(new URLSearchParams(location.search).get('page') || 1),
      hasNext: false,
      articles: [],
      filtered: []
    };

    function esc(v) {
      return String(v || '').replace(/[&<>'\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
    }

    function articleCard(a) {
      const d = new Date(a.createDate || Date.now());
      const date = Number.isNaN(d.getTime()) ? '' : d.toLocaleDateString();
      return `
        <article class="Box">
          <div class="Box-body">
            <div class="d-flex flex-items-start flex-justify-between flex-wrap gap-2">
              <div>
                <a class="h3 no-underline" href="/article/${encodeURIComponent(a.permalink)}">${esc(a.title || 'Untitled')}</a>
                <p class="color-fg-muted mb-2">${esc(a.excerpt || '')}</p>
                <p class="f6 color-fg-muted mb-0">${esc(a.label || 'general')} • ${esc(date)}</p>
              </div>
              <button class="btn" data-bookmark="${esc(a.permalink)}" data-title="${esc(a.title || '')}">Bookmark</button>
            </div>
          </div>
        </article>
      `;
    }

    function collectCategories(items) {
      const cats = [...new Set(items.map(i => (i.label || '').trim()).filter(Boolean))].sort();
      const sel = document.getElementById('categoryFilter');
      const cur = sel.value;
      sel.innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
      sel.value = cur;
    }

    function applyFilter() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const cat = document.getElementById('categoryFilter').value.trim().toLowerCase();
      state.filtered = state.articles.filter(a => {
        const title = String(a.title || '').toLowerCase();
        const ex = String(a.excerpt || '').toLowerCase();
        const lb = String(a.label || '').toLowerCase();
        const okQ = !q || title.includes(q) || ex.includes(q);
        const okC = !cat || lb === cat;
        return okQ && okC;
      });
      renderArticles();
    }

    function renderArticles() {
      const grid = document.getElementById('articlesGrid');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('articleCount');
      const items = state.filtered;

      count.textContent = `${items.length} article${items.length === 1 ? '' : 's'}`;

      if (!items.length) {
        grid.innerHTML = '';
        empty.hidden = false;
      } else {
        empty.hidden = true;
        grid.innerHTML = items.map(articleCard).join('');
      }
    }

    function setPagination() {
      const wrap = document.getElementById('paginationWrap');
      wrap.hidden = false;
      document.getElementById('pageLabel').textContent = `Page ${state.page}`;
      document.getElementById('prevBtn').disabled = state.page <= 1;
      document.getElementById('nextBtn').disabled = !state.hasNext;
    }

    async function loadArticles() {
      const loading = document.getElementById('loadingState');
      try {
        const res = await fetch(`/api/articles?paginate=true&page=${state.page}`);
        const data = await res.json();
        state.articles = Array.isArray(data?.articles) ? data.articles : [];
        state.hasNext = Boolean(data?.hasNextPage);
        collectCategories(state.articles);
        applyFilter();
        setPagination();
      } catch {
        document.getElementById('articlesGrid').innerHTML = '<article class="Box"><div class="Box-body">Failed to load articles.</div></article>';
        document.getElementById('paginationWrap').hidden = true;
      } finally {
        loading.hidden = true;
      }
    }

    function saveBookmark(permalink, title) {
      const raw = localStorage.getItem('blog_bookmarks');
      const list = raw ? JSON.parse(raw) : [];
      if (list.some(i => i.permalink === permalink)) return;
      list.unshift({ permalink, title, time: Date.now() });
      localStorage.setItem('blog_bookmarks', JSON.stringify(list.slice(0, 100)));
    }

    document.getElementById('searchInput').addEventListener('input', applyFilter);
    document.getElementById('categoryFilter').addEventListener('change', applyFilter);

    document.getElementById('articlesGrid').addEventListener('click', e => {
      const btn = e.target.closest('[data-bookmark]');
      if (!btn) return;
      saveBookmark(btn.dataset.bookmark, btn.dataset.title || '');
      btn.disabled = true;
      btn.textContent = 'Bookmarked';
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (state.page <= 1) return;
      state.page -= 1;
      location.search = `?page=${state.page}`;
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (!state.hasNext) return;
      state.page += 1;
      location.search = `?page=${state.page}`;
    });

    loadArticles();
  </script>
</body>
</html>
