<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Users — {{siteName}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@primer/css@21.8.5/dist/primer.min.css">
</head>
<body class="color-bg-default color-fg-default">
  <header class="border-bottom color-border-muted">
    <div class="container-lg p-3 d-flex flex-items-center flex-justify-between flex-wrap gap-2">
      <h1 class="h3 m-0">Admin Users</h1>
      <div class="d-flex gap-2">
        <a href="/admin" class="btn">Back to Admin</a>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
    </div>
  </header>

  <main class="container-lg p-3">
    <section class="Box mb-3">
      <div class="Box-body d-flex flex-wrap gap-2">
        <button id="addUserBtn" class="btn btn-primary">Add User</button>
      </div>
    </section>

    <section class="Box mb-3">
      <div class="Box-header"><h2 class="Box-title">Users</h2></div>
      <div class="Box-body">
        <table class="width-full" id="usersTable">
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="Box" id="formCard" hidden>
      <div class="Box-header"><h2 class="Box-title" id="modalTitle">Add User</h2></div>
      <div class="Box-body">
        <form id="userForm" class="d-grid gap-2">
          <input id="userId" type="hidden">
          <div>
            <label class="form-label" for="uUsername">Username</label>
            <input id="uUsername" class="form-control" required>
          </div>
          <div>
            <label class="form-label" for="uEmail">Email</label>
            <input id="uEmail" class="form-control" type="email" required>
          </div>
          <div>
            <label class="form-label" for="uPassword">Password</label>
            <input id="uPassword" class="form-control" type="password">
            <p id="passwordHint" class="f6 color-fg-muted" hidden>Leave empty to keep existing password.</p>
          </div>
          <div>
            <label class="form-label" for="uRole">Role</label>
            <select id="uRole" class="form-select">
              <option value="admin">admin</option>
              <option value="superadmin">superadmin</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="uStatus">Status</label>
            <select id="uStatus" class="form-select">
              <option value="active">active</option>
              <option value="disabled">disabled</option>
            </select>
          </div>
          <p id="userFormError" class="color-fg-danger" hidden></p>
          <div class="d-flex gap-2">
            <button id="saveUserBtn" class="btn btn-primary" type="submit">Save</button>
            <button id="cancelUserBtn" class="btn" type="button">Cancel</button>
          </div>
        </form>
      </div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/';

    let users = [];
    let deletingUserId = null;

    function esc(v) {
      return String(v || '').replace(/[&<>'\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
    }

    function showError(msg) {
      const el = document.getElementById('userFormError');
      if (!msg) {
        el.hidden = true;
        el.textContent = '';
      } else {
        el.hidden = false;
        el.textContent = msg;
      }
    }

    function showForm(show) {
      document.getElementById('formCard').hidden = !show;
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      });
      if (res.status === 401) {
        localStorage.removeItem('token');
        location.href = '/';
        throw new Error('unauthorized');
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data?.error || 'Request failed');
      return data;
    }

    function renderUsers() {
      const tbody = document.getElementById('usersTableBody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="5">No users found.</td></tr>';
        return;
      }
      tbody.innerHTML = users.map(u => `
        <tr>
          <td>${esc(u.username)}</td>
          <td>${esc(u.email)}</td>
          <td>${esc(u.role)}</td>
          <td>${esc(u.status)}</td>
          <td>
            <button class="btn" data-edit="${esc(u.id)}">Edit</button>
            <button class="btn" data-del="${esc(u.id)}" ${u.role === 'superadmin' ? 'disabled' : ''}>Delete</button>
          </td>
        </tr>
      `).join('');
    }

    async function loadUsers() {
      const data = await api('/api/admins');
      users = Array.isArray(data?.admins) ? data.admins : (Array.isArray(data) ? data : []);
      renderUsers();
    }

    function startAdd() {
      document.getElementById('modalTitle').textContent = 'Add User';
      document.getElementById('userForm').reset();
      document.getElementById('userId').value = '';
      document.getElementById('uPassword').required = true;
      document.getElementById('passwordHint').hidden = true;
      showError('');
      showForm(true);
    }

    function startEdit(userId) {
      const u = users.find(x => String(x.id) === String(userId));
      if (!u) return;
      document.getElementById('modalTitle').textContent = 'Edit User';
      document.getElementById('userId').value = u.id;
      document.getElementById('uUsername').value = u.username || '';
      document.getElementById('uEmail').value = u.email || '';
      document.getElementById('uRole').value = u.role || 'admin';
      document.getElementById('uStatus').value = u.status || 'active';
      document.getElementById('uPassword').value = '';
      document.getElementById('uPassword').required = false;
      document.getElementById('passwordHint').hidden = false;
      showError('');
      showForm(true);
    }

    async function saveUser(e) {
      e.preventDefault();
      showError('');
      const id = document.getElementById('userId').value;
      const payload = {
        username: document.getElementById('uUsername').value.trim(),
        email: document.getElementById('uEmail').value.trim(),
        role: document.getElementById('uRole').value,
        status: document.getElementById('uStatus').value
      };
      const password = document.getElementById('uPassword').value;
      if (password) payload.password = password;

      const btn = document.getElementById('saveUserBtn');
      btn.disabled = true;
      try {
        if (id) {
          await api(`/api/admins/${encodeURIComponent(id)}`, { method: 'PUT', body: JSON.stringify(payload) });
        } else {
          if (!password) throw new Error('Password is required for new users');
          await api('/api/admins', { method: 'POST', body: JSON.stringify(payload) });
        }
        showForm(false);
        await loadUsers();
      } catch (err) {
        showError(err.message || 'Save failed');
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteUser(userId) {
      const user = users.find(u => String(u.id) === String(userId));
      if (!user) return;
      if (user.role === 'superadmin') return;
      if (!confirm(`Delete user "${user.username}"?`)) return;
      await api(`/api/admins/${encodeURIComponent(userId)}`, { method: 'DELETE' });
      await loadUsers();
    }

    document.getElementById('addUserBtn').addEventListener('click', startAdd);
    document.getElementById('cancelUserBtn').addEventListener('click', () => showForm(false));
    document.getElementById('userForm').addEventListener('submit', saveUser);

    document.getElementById('usersTableBody').addEventListener('click', async e => {
      const edit = e.target.closest('[data-edit]');
      if (edit) return startEdit(edit.dataset.edit);
      const del = e.target.closest('[data-del]');
      if (del) {
        try { await deleteUser(del.dataset.del); } catch { alert('Delete failed'); }
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      location.href = '/';
    });

    loadUsers().catch(() => {
      document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="5">Failed to load users.</td></tr>';
    });
  </script>
</body>
</html>
