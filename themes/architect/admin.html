<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — {{siteName}}</title>
  <link rel="stylesheet" href="https://unpkg.com/@primer/css@21.2.4/dist/primer.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root{--bg:#f6f8fa;--fg:#1f2328;--line:#d0d7de;--panel:#fff;--muted:#59636e;--brand:#0969da;--d-bg:#0d1117;--d-fg:#e6edf3;--d-line:#30363d;--d-panel:#161b22;--d-muted:#8b949e}
    [data-theme='dark']{--bg:var(--d-bg);--fg:var(--d-fg);--line:var(--d-line);--panel:var(--d-panel);--muted:var(--d-muted);--brand:#58a6ff}
    body{margin:0;background:var(--bg);color:var(--fg)}
    .app{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh}
    .side{border-right:1px solid var(--line);background:var(--panel);padding:1rem}.main{padding:1rem}
    .menu a,.menu button{width:100%;text-align:left;margin-bottom:.4rem;border:1px solid var(--line);background:var(--panel);color:var(--fg);padding:.55rem .7rem;border-radius:8px;text-decoration:none;cursor:pointer}
    .menu a.active,.menu button.active{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand) inset}
    .card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:1rem}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.8rem}.stat{border:1px solid var(--line);border-radius:10px;padding:.8rem;background:var(--panel)}
    .table{width:100%;border-collapse:collapse}.table th,.table td{padding:.55rem;border-bottom:1px solid var(--line);text-align:left}
    @media(max-width:920px){.app{grid-template-columns:1fr}.side{border-right:none;border-bottom:1px solid var(--line)}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
  </style>
  {{codeBeforHead}}
</head>
<body>
  <div class="app">
    <aside class="side">
      <h3 class="h3"><i class="fa-solid fa-ruler-combined" style="color:var(--brand)"></i> {{siteName}} Admin</h3>
      <div class="menu">
        <button id="tab-articles" class="active" onclick="showPanel('articles')"><i class="fa-solid fa-newspaper"></i> Articles</button>
        <a href="/admin/edit"><i class="fa-solid fa-plus"></i> New Article</a>
        <a href="/admin/users"><i class="fa-solid fa-users"></i> Users</a>
        <button id="tab-tools" onclick="showPanel('tools')"><i class="fa-solid fa-toolbox"></i> Tools</button>
      </div>
      <div class="mt-2 d-flex gap-1 flex-wrap"><a class="btn btn-sm" href="/"><i class="fa-solid fa-eye"></i> Blog</a><button class="btn btn-sm" onclick="toggleTheme()"><i id="themeIcon" class="fa-solid fa-moon"></i></button></div>
    </aside>

    <main class="main">
      <div class="d-flex flex-items-center flex-justify-between mb-2"><h1 class="h2 mb-0">Dashboard</h1><a class="btn btn-primary" href="/admin/edit"><i class="fa-solid fa-plus"></i> New</a></div>
      <section class="stats mb-3">
        <div class="stat"><div class="color-fg-muted f6">Published</div><div id="statPublished" class="h2 m-0">–</div></div>
        <div class="stat"><div class="color-fg-muted f6">Drafts</div><div id="statDrafts" class="h2 m-0">–</div></div>
        <div class="stat"><div class="color-fg-muted f6">Categories</div><div id="statCategories" class="h2 m-0">–</div></div>
        <div class="stat"><div class="color-fg-muted f6">Total</div><div id="statTotal" class="h2 m-0">–</div></div>
      </section>

      <section id="panel-articles" class="card">
        <div class="d-flex flex-items-center flex-justify-between mb-2 flex-wrap gap-2"><div class="d-flex gap-1"><button class="btn btn-sm" id="tabPub" onclick="switchTab('published')">Published <span class="Counter" id="tabCountPublished">0</span></button><button class="btn btn-sm" id="tabDraft" onclick="switchTab('drafts')">Drafts <span class="Counter" id="tabCountDrafts">0</span></button></div><input id="articleSearch" class="form-control" style="max-width:280px" placeholder="Search articles"></div>
        <div style="overflow:auto"><table class="table"><thead><tr><th>Title</th><th>Category</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody id="articlesTableBody"><tr><td colspan="5">Loading…</td></tr></tbody></table></div>
        <div id="tablePagination" class="d-flex flex-items-center flex-justify-between mt-2"></div>
      </section>

      <section id="panel-tools" class="card" style="display:none">
        <h2 class="h3 mt-0">Tools</h2>
        <div class="d-flex gap-2 flex-wrap">
          <button class="btn" onclick="exportData()"><i class="fa-solid fa-download"></i> Export JSON</button>
          <label class="btn" for="importFile"><i class="fa-solid fa-upload"></i> Import JSON</label><input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)">
          <a class="btn" href="/sitemap.xml" target="_blank" rel="noopener"><i class="fa-solid fa-sitemap"></i> Sitemap</a>
          <a class="btn" href="/rss.xml" target="_blank" rel="noopener"><i class="fa-solid fa-rss"></i> RSS</a>
          <button class="btn btn-danger" onclick="clearAllContent()"><i class="fa-solid fa-trash"></i> Clear Content</button>
        </div>
      </section>
    </main>
  </div>

  <script>
    const getTheme=()=>localStorage.getItem('theme')||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
    function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('themeIcon').className=t==='dark'?'fa-solid fa-sun':'fa-solid fa-moon'}
    function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')}setTheme(getTheme());
    function showPanel(name){['articles','tools'].forEach(p=>{document.getElementById(`panel-${p}`).style.display=p===name?'':'none';document.getElementById(`tab-${p}`)?.classList.toggle('active',p===name)})}

    const esc=s=>s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'):'';
    const escJs=s=>s?String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n').replace(/\r/g,'\\r'):'';

    let allArticles=[],allDrafts=[],currentTab='published',currentPage=1,searchQ='';const PAGE_SIZE=15;
    document.getElementById('articleSearch').addEventListener('input',function(){searchQ=this.value.toLowerCase();currentPage=1;renderTable()});
    function switchTab(tab){currentTab=tab;currentPage=1;document.getElementById('tabPub').classList.toggle('btn-primary',tab==='published');document.getElementById('tabDraft').classList.toggle('btn-primary',tab==='drafts');renderTable()}

    async function loadArticles(){try{const [pubRes,draftRes]=await Promise.all([fetch('/api/articles'),fetch('/api/articles?drafts=true')]);allArticles=pubRes.ok?await pubRes.json():[];allDrafts=draftRes.ok?await draftRes.json():[];const total=allArticles.length+allDrafts.length;const cats=new Set([...allArticles,...allDrafts].map(a=>a.label).filter(Boolean));document.getElementById('statPublished').textContent=allArticles.length;document.getElementById('statDrafts').textContent=allDrafts.length;document.getElementById('statCategories').textContent=cats.size;document.getElementById('statTotal').textContent=total;document.getElementById('tabCountPublished').textContent=allArticles.length;document.getElementById('tabCountDrafts').textContent=allDrafts.length;renderTable()}catch{document.getElementById('articlesTableBody').innerHTML='<tr><td colspan="5">Error loading articles.</td></tr>'}}
    function renderTable(){const source=currentTab==='published'?allArticles:allDrafts;const filtered=searchQ?source.filter(a=>(a.title||'').toLowerCase().includes(searchQ)||(a.label||'').toLowerCase().includes(searchQ)):source;const totalPages=Math.ceil(filtered.length/PAGE_SIZE)||1;const page=Math.min(currentPage,totalPages);const start=(page-1)*PAGE_SIZE;const items=filtered.slice(start,start+PAGE_SIZE);const tb=document.getElementById('articlesTableBody');if(!items.length){tb.innerHTML='<tr><td colspan="5">No articles found.</td></tr>';document.getElementById('tablePagination').innerHTML='';return}tb.innerHTML=items.map(a=>`<tr><td><a class='Link--primary' target='_blank' rel='noopener' href='/article/${esc(a.permalink)}'>${esc(a.title)}</a></td><td>${esc(a.label||'–')}</td><td>${new Date(a.createDate).toLocaleDateString()}</td><td><span class='Label ${a.status==='draft'?'':'Label--success'}'>${a.status==='draft'?'Draft':'Published'}</span></td><td class='d-flex gap-1'><a class='btn btn-sm' href='/admin/edit?permalink=${esc(a.permalink)}'><i class='fa-solid fa-pen'></i></a><button class='btn btn-sm btn-danger' onclick="deleteArticle('${escJs(a.permalink)}')"><i class='fa-solid fa-trash'></i></button></td></tr>`).join('');document.getElementById('tablePagination').innerHTML=`<span class='f6 color-fg-muted'>${start+1}–${Math.min(start+PAGE_SIZE,filtered.length)} of ${filtered.length}</span><div class='d-flex gap-1'><button class='btn btn-sm' ${page<=1?'disabled':''} onclick='currentPage=${page-1};renderTable()'>‹</button><button class='btn btn-sm' ${page>=totalPages?'disabled':''} onclick='currentPage=${page+1};renderTable()'>›</button></div>`}
    async function deleteArticle(permalink){if(!confirm('Delete this article?'))return;try{const r=await fetch(`/api/articles/${permalink}`,{method:'DELETE'});if(!r.ok)throw new Error('Failed');await loadArticles()}catch{alert('Error deleting article.')}}
    async function exportData(){try{const r=await fetch('/api/export');if(!r.ok)throw new Error('fail');const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`blog-export-${new Date().toISOString().split('T')[0]}.json`;a.click();URL.revokeObjectURL(u)}catch{alert('Export failed')}}
    async function importData(e){const f=e.target.files[0];if(!f)return;try{const data=JSON.parse(await f.text());const r=await fetch('/api/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok)throw new Error(j.error||'Import failed');alert(j.message||`Imported ${j.imported} articles`);await loadArticles()}catch(err){alert(err.message||'Import failed')}e.target.value=''}
    async function clearAllContent(){if(!confirm('Delete all articles, drafts, and comments? This cannot be undone.'))return;try{const r=await fetch('/api/content/clear-all',{method:'POST'});const j=await r.json();if(!r.ok)throw new Error(j.error||'Failed');alert(j.message||'All content deleted');await loadArticles();showPanel('articles')}catch(e){alert(e.message||'Failed')}}
    loadArticles();
  </script>
  {{codeBeforBody}}
</body>
</html>
