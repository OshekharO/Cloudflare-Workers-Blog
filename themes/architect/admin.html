<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — {{siteName}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@primer/css@21.8.5/dist/primer.min.css">
</head>
<body class="color-bg-default color-fg-default">
  <header class="border-bottom color-border-muted">
    <div class="container-lg p-3 d-flex flex-items-center flex-justify-between flex-wrap gap-2">
      <h1 class="h3 m-0">Architect Admin</h1>
      <div class="d-flex gap-2">
        <a href="/" class="btn">View Site</a>
        <a href="/edit" class="btn btn-primary">New Article</a>
        <button id="logoutBtn" class="btn">Logout</button>
      </div>
    </div>
  </header>

  <main class="container-lg p-3">
    <section class="d-grid gap-3 mb-3">
      <div class="Box"><div class="Box-body">Published: <strong id="statPublished">0</strong></div></div>
      <div class="Box"><div class="Box-body">Drafts: <strong id="statDrafts">0</strong></div></div>
      <div class="Box"><div class="Box-body">Categories: <strong id="statCategories">0</strong></div></div>
      <div class="Box"><div class="Box-body">Total: <strong id="statTotal">0</strong></div></div>
    </section>

    <section class="Box mb-3">
      <div class="Box-body d-flex flex-wrap gap-2">
        <input id="articleSearch" class="form-control flex-1" type="search" placeholder="Search title, permalink, or category">
        <button id="tabPublished" class="btn btn-primary">Published (<span id="tabCountPublished">0</span>)</button>
        <button id="tabDrafts" class="btn">Drafts (<span id="tabCountDrafts">0</span>)</button>
        <a href="/bookmarks" class="btn">Bookmarks</a>
        <a href="/admin-users" class="btn">Users</a>
      </div>
    </section>

    <section class="Box mb-3">
      <div class="Box-header">
        <h2 class="Box-title">Articles</h2>
      </div>
      <div class="Box-body">
        <div class="TableObject">
          <table class="width-full">
            <thead>
              <tr>
                <th>Title</th>
                <th>Permalink</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="articlesTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="Box-footer" id="tablePagination"></div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) location.href = '/';

    const state = {
      tab: 'published',
      page: 1,
      pageSize: 10,
      allArticles: [],
      allDrafts: []
    };

    function esc(v) {
      return String(v || '').replace(/[&<>'\"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
    }

    function fmt(v) {
      const d = new Date(v || Date.now());
      return Number.isNaN(d.getTime()) ? '' : d.toLocaleDateString();
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          Authorization: `Bearer ${token}`,
          ...(options.headers || {})
        }
      });
      if (res.status === 401) {
        localStorage.removeItem('token');
        location.href = '/';
        throw new Error('unauthorized');
      }
      if (!res.ok) throw new Error('request failed');
      return res.json();
    }

    function refreshStats() {
      const cats = new Set([...state.allArticles, ...state.allDrafts].map(a => (a.label || '').trim()).filter(Boolean));
      document.getElementById('statPublished').textContent = state.allArticles.length;
      document.getElementById('statDrafts').textContent = state.allDrafts.length;
      document.getElementById('statCategories').textContent = cats.size;
      document.getElementById('statTotal').textContent = state.allArticles.length + state.allDrafts.length;
      document.getElementById('tabCountPublished').textContent = state.allArticles.length;
      document.getElementById('tabCountDrafts').textContent = state.allDrafts.length;
    }

    function getCurrentData() {
      const base = state.tab === 'published' ? state.allArticles : state.allDrafts;
      const q = document.getElementById('articleSearch').value.trim().toLowerCase();
      if (!q) return base;
      return base.filter(a => {
        return String(a.title || '').toLowerCase().includes(q)
          || String(a.permalink || '').toLowerCase().includes(q)
          || String(a.label || '').toLowerCase().includes(q);
      });
    }

    function renderTable() {
      const data = getCurrentData();
      const start = (state.page - 1) * state.pageSize;
      const rows = data.slice(start, start + state.pageSize);
      const tbody = document.getElementById('articlesTableBody');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5">No articles found.</td></tr>';
      } else {
        tbody.innerHTML = rows.map(a => `
          <tr>
            <td>${esc(a.title || 'Untitled')}</td>
            <td>${esc(a.permalink || '')}</td>
            <td>${esc(a.label || '')}</td>
            <td>${esc(fmt(a.createDate))}</td>
            <td>
              <a class="btn" href="/edit?permalink=${encodeURIComponent(a.permalink || '')}">Edit</a>
              <button class="btn" data-del="${esc(a.permalink || '')}">Delete</button>
            </td>
          </tr>
        `).join('');
      }
      renderPagination(data.length);
    }

    function renderPagination(total) {
      const pages = Math.max(1, Math.ceil(total / state.pageSize));
      const wrap = document.getElementById('tablePagination');
      wrap.innerHTML = `
        <div class="d-flex flex-items-center flex-justify-between">
          <button class="btn" id="pagePrev" ${state.page <= 1 ? 'disabled' : ''}>Previous</button>
          <span class="color-fg-muted">Page ${state.page} / ${pages}</span>
          <button class="btn" id="pageNext" ${state.page >= pages ? 'disabled' : ''}>Next</button>
        </div>
      `;
      document.getElementById('pagePrev').onclick = () => { if (state.page > 1) { state.page--; renderTable(); } };
      document.getElementById('pageNext').onclick = () => { if (state.page < pages) { state.page++; renderTable(); } };
    }

    async function loadData() {
      const published = await api('/api/articles');
      const drafts = await api('/api/articles?drafts=true');
      state.allArticles = Array.isArray(published?.articles) ? published.articles : (Array.isArray(published) ? published : []);
      state.allDrafts = Array.isArray(drafts?.articles) ? drafts.articles : (Array.isArray(drafts) ? drafts : []);
      refreshStats();
      renderTable();
    }

    document.getElementById('tabPublished').addEventListener('click', () => {
      state.tab = 'published';
      state.page = 1;
      document.getElementById('tabPublished').classList.add('btn-primary');
      document.getElementById('tabDrafts').classList.remove('btn-primary');
      renderTable();
    });

    document.getElementById('tabDrafts').addEventListener('click', () => {
      state.tab = 'drafts';
      state.page = 1;
      document.getElementById('tabDrafts').classList.add('btn-primary');
      document.getElementById('tabPublished').classList.remove('btn-primary');
      renderTable();
    });

    document.getElementById('articleSearch').addEventListener('input', () => {
      state.page = 1;
      renderTable();
    });

    document.getElementById('articlesTableBody').addEventListener('click', async e => {
      const btn = e.target.closest('[data-del]');
      if (!btn) return;
      const permalink = btn.dataset.del;
      if (!confirm(`Delete article "${permalink}"?`)) return;
      try {
        await api(`/api/articles/${encodeURIComponent(permalink)}`, { method: 'DELETE' });
        await loadData();
      } catch {
        alert('Delete failed');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      location.href = '/';
    });

    loadData().catch(() => {
      document.getElementById('articlesTableBody').innerHTML = '<tr><td colspan="5">Failed to load data.</td></tr>';
    });
  </script>
</body>
</html>
